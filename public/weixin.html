<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeChat Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <!-- Nav -->
  <nav class="sticky top-0 z-10 bg-white/80 backdrop-blur border-b border-slate-200">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/" class="text-sm text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-1">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          返回主面板
        </a>
        <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">WeChat Management</h1>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-6">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Account Status -->
      <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
        <h2 class="font-semibold text-slate-700 mb-4">账号状态</h2>
        <div id="summary-banner" class="mb-4 rounded-lg p-3 text-sm bg-slate-50 border border-slate-200 text-slate-500">
          正在加载账号状态…
        </div>
        <div id="account-list" class="space-y-3">
          <div class="text-sm text-slate-400 p-3 border border-dashed border-slate-200 rounded-lg">正在加载…</div>
        </div>
      </section>

      <!-- QR Code Section -->
      <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
        <h2 class="font-semibold text-slate-700 mb-2">连接新微信账号</h2>
        <p class="text-sm text-slate-500 mb-4">通过本地网关生成新的登录二维码，扫码后在手机上确认即可完成绑定。</p>

        <button id="link-button" type="button" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-xl transition-colors flex items-center justify-center gap-2">
          <span id="link-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          <span id="link-label">🔗 生成登录二维码</span>
        </button>

        <!-- QR Display -->
        <div id="qr-shell" class="mt-5">
          <div id="qr-frame" class="hidden relative w-full max-w-[280px] mx-auto aspect-square rounded-2xl bg-white border border-slate-200 flex items-center justify-center p-4">
            <canvas id="qr-canvas" class="w-full h-auto rounded-xl"></canvas>
            <div id="qr-overlay" class="absolute inset-0 bg-slate-900/60 rounded-2xl hidden items-center justify-center flex-col gap-3 text-white">
              <span class="text-sm">二维码已过期</span>
              <button id="overlay-refresh-button" type="button" class="text-sm bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition-colors">点击刷新</button>
            </div>
          </div>

          <div id="qr-status-block" class="hidden mt-4 text-center space-y-1">
            <div id="qr-state-label" class="inline-flex items-center gap-2 font-semibold text-slate-500">
              <span id="qr-state-dot" class="w-2.5 h-2.5 rounded-full bg-current"></span>
              <span id="qr-state-text">等待扫码…</span>
            </div>
            <div id="qr-state-detail" class="text-sm text-slate-400"></div>
            <div id="linked-account" class="hidden text-sm text-slate-500"></div>
          </div>
        </div>

        <div id="status-live" class="sr-only" aria-live="polite"></div>
      </section>

    </div>
  </main>

  <!-- Modal -->
  <div id="modal-backdrop" class="fixed inset-0 z-20 bg-slate-900/50 hidden items-center justify-center p-4" hidden>
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl border border-slate-200">
      <h2 class="font-semibold text-slate-800 text-lg">确认操作</h2>
      <p class="text-sm text-slate-500 mt-2 leading-relaxed">将生成新的登录二维码。如果已有账号连接，可能会被替换。</p>
      <div class="flex justify-end gap-3 mt-5">
        <button id="modal-cancel" type="button" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">取消</button>
        <button id="modal-confirm" type="button" class="px-4 py-2 text-sm bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors flex items-center gap-2">
          <span id="modal-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          <span id="modal-confirm-label">确认生成</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const state = {
      accounts: [],
      modalOpen: false,
      lastTrigger: null,
      loadingQr: false,
      currentSession: null,
      pollAbort: false,
    };

    const linkButton = document.getElementById('link-button');
    const linkLabel = document.getElementById('link-label');
    const linkSpinner = document.getElementById('link-spinner');
    const summaryBanner = document.getElementById('summary-banner');
    const accountList = document.getElementById('account-list');
    const qrFrame = document.getElementById('qr-frame');
    const qrCanvas = document.getElementById('qr-canvas');
    const qrStatusBlock = document.getElementById('qr-status-block');
    const qrStateLabel = document.getElementById('qr-state-label');
    const qrStateText = document.getElementById('qr-state-text');
    const qrStateDetail = document.getElementById('qr-state-detail');
    const linkedAccount = document.getElementById('linked-account');
    const qrOverlay = document.getElementById('qr-overlay');
    const overlayRefreshButton = document.getElementById('overlay-refresh-button');
    const liveRegion = document.getElementById('status-live');
    const modalBackdrop = document.getElementById('modal-backdrop');
    const modalCancel = document.getElementById('modal-cancel');
    const modalConfirm = document.getElementById('modal-confirm');
    const modalSpinner = document.getElementById('modal-spinner');
    const modalConfirmLabel = document.getElementById('modal-confirm-label');

    function escapeHtml(v) {
      return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function announce(msg) { liveRegion.textContent = msg; }

    function normalizeStatus(raw) {
      const v = String(raw || '').toUpperCase();
      if (['OK','CONNECTED','ONLINE','ACTIVE'].includes(v)) return 'online';
      if (['WARN','PENDING','WAITING','SCANED','SCANNED'].includes(v)) return 'warning';
      return 'offline';
    }

    function setPrimaryLoading(loading) {
      state.loadingQr = loading;
      linkButton.disabled = loading;
      modalConfirm.disabled = loading;
      linkSpinner.classList.toggle('hidden', !loading);
      modalSpinner.classList.toggle('hidden', !loading);
      modalConfirmLabel.textContent = loading ? '生成中…' : '确认生成';
      linkLabel.textContent = loading ? '生成中…' : '🔗 生成登录二维码';
    }

    function renderSummary() {
      if (!state.accounts.length) {
        summaryBanner.className = 'mb-4 rounded-lg p-3 text-sm bg-amber-50 border border-amber-200 text-amber-700';
        summaryBanner.textContent = '暂未检测到账号，请生成二维码绑定。';
        return;
      }
      const hasOffline = state.accounts.some(a => normalizeStatus(a.status) !== 'online');
      if (hasOffline) {
        summaryBanner.className = 'mb-4 rounded-lg p-3 text-sm bg-amber-50 border border-amber-200 text-amber-700';
        summaryBanner.textContent = '部分账号离线或需要关注。';
      } else {
        summaryBanner.className = 'mb-4 rounded-lg p-3 text-sm bg-green-50 border border-green-200 text-green-700';
        summaryBanner.textContent = '✅ 所有账号已连接。';
      }
    }

    function renderAccounts() {
      if (!state.accounts.length) {
        accountList.innerHTML = '<div class="text-sm text-slate-400 p-3 border border-dashed border-slate-200 rounded-lg">暂无已绑定的微信账号。</div>';
        return;
      }
      accountList.innerHTML = state.accounts.map(a => {
        const tone = normalizeStatus(a.status);
        const dotColor = tone === 'online' ? 'bg-green-500' : tone === 'warning' ? 'bg-amber-500' : 'bg-red-500';
        const label = tone === 'online' ? '在线' : tone === 'warning' ? '待确认' : '离线';
        return `<div class="flex items-center justify-between p-3 rounded-xl bg-slate-50 border border-slate-200">
          <div class="min-w-0">
            <div class="font-medium text-slate-700 truncate">${escapeHtml(a.account || 'Unknown')}</div>
            ${a.baseUrl ? `<div class="text-xs text-slate-400 truncate">${escapeHtml(a.baseUrl)}</div>` : ''}
          </div>
          <div class="flex items-center gap-1.5 text-xs font-medium shrink-0">
            <span class="w-2 h-2 rounded-full ${dotColor}"></span>
            <span>${label}</span>
          </div>
        </div>`;
      }).join('');
    }

    function setQrState(kind, text, detail, accountId) {
      qrStatusBlock.classList.remove('hidden');
      const colors = { waiting: 'text-slate-500', scanned: 'text-amber-600', connected: 'text-green-600', expired: 'text-red-500', error: 'text-red-500' };
      qrStateLabel.className = `inline-flex items-center gap-2 font-semibold ${colors[kind] || 'text-slate-500'}`;
      qrStateText.textContent = text;
      qrStateDetail.textContent = detail || '';
      linkedAccount.classList.toggle('hidden', !accountId);
      linkedAccount.textContent = accountId ? `账号: ${accountId}` : '';
      announce(text);
    }

    function resetQrVisuals() {
      state.pollAbort = true;
      state.currentSession = null;
      qrFrame.classList.add('hidden');
      qrStatusBlock.classList.add('hidden');
      qrOverlay.classList.add('hidden');
      qrOverlay.classList.remove('flex');
      linkedAccount.classList.add('hidden');
      const ctx = qrCanvas.getContext('2d');
      ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
    }

    async function renderQrCode(url) {
      qrFrame.classList.remove('hidden');
      qrStatusBlock.classList.remove('hidden');
      qrOverlay.classList.add('hidden');
      qrOverlay.classList.remove('flex');
      await QRCode.toCanvas(qrCanvas, url, { width: 280, margin: 2, color: { dark: '#1e293b', light: '#ffffff' } });
    }

    async function fetchStatus() {
      const res = await fetch('/api/weixin/status', { cache: 'no-store' });
      if (!res.ok) throw new Error('无法加载状态');
      const data = await res.json();
      state.accounts = Array.isArray(data.accounts) ? data.accounts : [];
      renderSummary();
      renderAccounts();
      setPrimaryLoading(false);
    }

    function openModal(trigger) {
      state.modalOpen = true;
      state.lastTrigger = trigger;
      modalBackdrop.hidden = false;
      modalBackdrop.classList.remove('hidden');
      modalBackdrop.classList.add('flex');
      document.body.style.overflow = 'hidden';
      modalCancel.focus();
    }

    function closeModal() {
      if (!state.modalOpen) return;
      state.modalOpen = false;
      modalBackdrop.classList.add('hidden');
      modalBackdrop.classList.remove('flex');
      modalBackdrop.hidden = true;
      document.body.style.overflow = '';
      if (state.lastTrigger?.focus) state.lastTrigger.focus();
    }

    async function startLoginFlow() {
      setPrimaryLoading(true);
      resetQrVisuals();
      state.pollAbort = false;
      try {
        const res = await fetch('/api/weixin/qr/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '无法生成二维码');
        state.currentSession = data.sessionId;
        await renderQrCode(data.qrUrl);
        setQrState('waiting', '等待扫码…', '请使用微信扫描二维码。');
        closeModal();
        pollQrStatus();
      } catch (e) {
        qrStatusBlock.classList.remove('hidden');
        setQrState('error', '生成失败', e.message);
      } finally {
        setPrimaryLoading(false);
      }
    }

    async function pollQrStatus() {
      const session = state.currentSession;
      if (!session || state.pollAbort) return;
      try {
        const res = await fetch(`/api/weixin/qr/status?session=${encodeURIComponent(session)}`, { cache: 'no-store' });
        const data = await res.json();
        if (state.currentSession !== session || state.pollAbort) return;

        if (data.status === 'confirmed') {
          setQrState('connected', '✅ 连接成功!', data.message || '账号已连接。', data.accountId);
          await fetchStatus().catch(() => {});
          return;
        }
        if (data.status === 'expired') {
          setQrState('expired', '二维码已过期', data.message);
          qrOverlay.classList.remove('hidden');
          qrOverlay.classList.add('flex');
          return;
        }
        if (data.status === 'scaned') {
          setQrState('scanned', '已扫码，请在手机上确认…', data.message);
        } else {
          setQrState('waiting', '等待扫码…', data.message || '请使用微信扫描二维码。');
        }
        setTimeout(() => { if (!state.pollAbort && state.currentSession === session) pollQrStatus(); }, 3000);
      } catch (e) {
        if (state.currentSession !== session || state.pollAbort) return;
        setQrState('error', '状态查询失败', e.message);
        qrOverlay.classList.remove('hidden');
        qrOverlay.classList.add('flex');
      }
    }

    linkButton.addEventListener('click', e => openModal(e.currentTarget));
    overlayRefreshButton.addEventListener('click', e => openModal(e.currentTarget));
    modalCancel.addEventListener('click', closeModal);
    modalConfirm.addEventListener('click', startLoginFlow);
    modalBackdrop.addEventListener('click', e => { if (e.target === modalBackdrop) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && state.modalOpen) { e.preventDefault(); closeModal(); } });

    fetchStatus().catch(e => {
      summaryBanner.className = 'mb-4 rounded-lg p-3 text-sm bg-red-50 border border-red-200 text-red-600';
      summaryBanner.textContent = e.message || '无法加载账号状态。';
      accountList.innerHTML = `<div class="text-sm text-slate-400 p-3 border border-dashed border-slate-200 rounded-lg">${escapeHtml(e.message)}</div>`;
    });
  </script>
</body>
</html>
