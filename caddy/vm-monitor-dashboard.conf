:80 {
    encode zstd gzip

    # Weixin management page - no auth required
    @weixin {
        path /weixin*
        path /api/weixin/*
    }
    handle @weixin {
        reverse_proxy 127.0.0.1:3000
    }

    # Everything else requires basicauth
    handle {
        basicauth {
            monitor $2a$14$qGveoZAZLRIt6Xf/gIFl4eO.Y2F/xrwgMY7bPqzpxa1DF7atM6JJG
        }
        header {
            X-Content-Type-Options nosniff
            X-Frame-Options SAMEORIGIN
            Referrer-Policy strict-origin-when-cross-origin
        }
        reverse_proxy 127.0.0.1:3000
    }
}
